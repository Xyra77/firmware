; PlatformIO Project Configuration File
; Board: ESP32-DEVKITC (ESP-WROOM-32)
; Based on: CYD-2432S028
; ============================================================
; PIN ASSIGNMENT:
;   SPI Bus    : MOSI=23, MISO=19, SCK=18
;   TFT ILI9341: CS=15, DC=2, BL=27, TOUCH_CS=33
;   SD Card    : CS=5
;   NRF24 #1   : CE=4,  CSN=16, IRQ=36
;   NRF24 #2   : CE=17, CSN=25, IRQ=39
;   LoRa1276   : NSS=26, NRESET=32, DIO0=34
;   GPS NEO-6M : TX->GPIO3(RX0), RX->GPIO1(TX0)
;   PN532 NFC  : SDA=21, SCL=22 (I2C)
;   IR TX      : GPIO33 (Grove IR Emitter U9)
;   IR RX      : GPIO35 (KY005, input only)
; ============================================================

[CYD_base]
board = CYD-2432S028
monitor_speed = 115200
board_build.partitions = custom_4Mb_full.csv
build_src_filter = ${env.build_src_filter} +<../boards/CYD-2432S028>
build_flags =
	${env.build_flags}
	-Iboards/CYD-2432S028
	-Os
	-DDISABLE_INTERPRETER=1
	-D SAFE_STACK_BUFFER_SIZE=1024
	-D SERIAL_CMDS_TASK_STACK_SIZE=1024*12
	;-D INTERPRETER_TASK_STACK_SIZE=1024*8
	-D SSH_TASK_STACK_SIZE=1024*8
	-D INPUT_HANDLER_TASK_STACK_SIZE=2048
	-D CONFIG_ASYNC_TCP_STACK_SIZE=1024*10
	-D CONFIG_ASYNC_TCP_QUEUE_SIZE=32
	-DCORE_DEBUG_LEVEL=0
	-DCONFIG_ESP32_JTAG_SUPPORT_DISABLE=1
	;-DARDUINO_USB_CDC_ON_BOOT=1

	-DCYD=1

	; Features
	-DFM_SI4713=1
	-DFM_RSTPIN=40
	-DPIN_CLK=-1
	-DI2S_SCLK_PIN=-1
	-DI2S_DATA_PIN=-1
	-DPIN_DATA=-1
	-DRGB_LED=-1
	-DBCLK=-1
	-DWCLK=-1
	-DDOUT=-1

	; Bad USB
	-DBAD_TX=GROVE_SDA
	-DBAD_RX=GROVE_SCL

	; GPS UART0
	-DSERIAL_TX=1
	-DSERIAL_RX=3

	; Buttons
	-DHAS_BTN=0
	-DBTN_ALIAS='"Ok"'
	-DBTN_PIN=0

	; IR TX: Grove IR Emitter (U9) -> GPIO33
	; IR RX: KY005 (H1)           -> GPIO35
	-DIR_TX_PINS='{{"Grove IR Emitter", 33}}'
	-DIR_RX_PINS='{{"KY005 IR RX", 35}}'
	-DLED=33
	-DLED_ON=HIGH
	-DLED_OFF=LOW

	; RF (no CC1101)
	-DRF_TX_PINS='{{"Pin 33", 33}}'
	-DRF_RX_PINS='{{"Pin 35", 35}}'

	; NRF24 #1 : CE=4, CSN=16, IRQ=36
	-DUSE_NRF24_VIA_SPI
	-DNRF24_CE_PIN=4
	-DNRF24_SS_PIN=16
	-DNRF24_MOSI_PIN=SPI_MOSI_PIN
	-DNRF24_SCK_PIN=SPI_SCK_PIN
	-DNRF24_MISO_PIN=SPI_MISO_PIN
	; NRF24 #2 : CE=17, CSN=25, IRQ=39
	; Bruce firmware hanya support 1 NRF24 aktif sekaligus
	; uncomment setelah modif nrf_common.cpp untuk dual NRF24
	;-DNRF24_CE_PIN_2=17
	;-DNRF24_SS_PIN_2=25

	; LoRa1276-C1 915MHz : NSS=26, NRESET=32, DIO0=34
	-DUSE_LORA_VIA_SPI
	-DLORA_CS_PIN=26
	-DLORA_RST_PIN=32
	-DLORA_DIO0_PIN=34
	-DLORA_SCK_PIN=18
	-DLORA_MOSI_PIN=23
	-DLORA_MISO_PIN=19
	;-DLORA_FREQUENCY=915E6

	; Font sizes
	-DFP=1
	-DFM=2
	-DFG=3

	; Screen
	-DHAS_SCREEN=1
	-DROTATION=1
	-DBACKLIGHT=27
	-DMINBRIGHT=10

	; TFT ILI9341 - VSPI (MOSI=23, MISO=19, SCK=18)
	-DUSER_SETUP_LOADED=1
	-DILI9341_DRIVER=1
	-DTFT_HEIGHT=320
	-DTFT_WIDTH=240
	-DTFT_MOSI=23
	-DTFT_MISO=19
	-DTFT_SCLK=18
	-DTFT_CS=15
	-DTFT_DC=2
	-DTFT_RST=-1
	-DTFT_BL=27
	-DTFT_BACKLIGHT_ON=HIGH
	-DSMOOTH_FONT=1

	; Touchscreen
	-DHAS_TOUCH=1
	-DUSE_TFT_eSPI_TOUCH
	-DTOUCH_CS=33

	; TFT Brightness PWM
	-DTFT_BRIGHT_CHANNEL=0
	-DTFT_BRIGHT_Bits=8
	-DTFT_BRIGHT_FREQ=5000

	; SD Card
	-DSDCARD_CS=5
	-DSDCARD_SCK=18
	-DSDCARD_MISO=19
	-DSDCARD_MOSI=23

	; I2C default
	-DGROVE_SDA=21
	-DGROVE_SCL=22

	; PN532 NFC I2C : SDA=21, SCL=22
	-DUSE_PN532_VIA_I2C
	-DPN532_I2C_SDA=21
	-DPN532_I2C_SCL=22

	; SPI Bus
	-DSPI_SCK_PIN=18
	-DSPI_MOSI_PIN=23
	-DSPI_MISO_PIN=19
	-DSPI_SS_PIN=5

	-DDEVICE_NAME='"ESP32-DEVKITC-Custom"'

lib_deps =
	${env.lib_deps}
lib_ignore =
	FastLED
	ESP8266Audio
	ESP8266SAM

; ============================================================
[env:ESP32-DEVKITC-Custom]
extends = CYD_base
build_flags =
	${CYD_base.build_flags}
	-DSPI_FREQUENCY=40000000
	-DSPI_READ_FREQUENCY=16000000
	-DSPI_TOUCH_FREQUENCY=2500000
	-DDEVICE_NAME='"ESP32-DEVKITC-Custom"'

[env:LAUNCHER_ESP32-DEVKITC-Custom]
extends = env:ESP32-DEVKITC-Custom
board_build.partitions = custom_4Mb.csv
build_flags =
	${env:ESP32-DEVKITC-Custom.build_flags}
	${env_light.build_flags}
lib_deps =
	${env_light.lib_deps}
